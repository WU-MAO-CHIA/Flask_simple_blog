services:
  web:
    build: .
    container_name: flask_app
    env_file:
      - .env
    volumes:
      - ./:/app
      

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/app
    depends_on:
      - web